name: expense_story
description: AI Business Expense Intelligence — CFO in your pocket.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^12.1.3

  # Local Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.1

  # Image Picking & Camera
  image_picker: ^1.0.7
  camera: ^0.10.5+9

  # AI & Networking
  google_generative_ai: ^0.4.0
  dio: ^5.4.0
  http: ^1.2.0

  # Charts & Visualization
  fl_chart: ^0.66.2
  syncfusion_flutter_charts: ^24.1.41

  # UI & Animations
  animate_do: ^3.3.4
  shimmer: ^3.0.0
  lottie: ^2.7.0
  flutter_staggered_animations: ^1.1.1
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  percent_indicator: ^4.2.3
  intl: ^0.19.0
  google_fonts: ^6.1.0

  # Utilities
  uuid: ^4.3.3
  share_plus: ^7.2.1
  pdf: ^3.10.7
  printing: ^5.11.1
  flutter_dotenv: ^5.1.0
  permission_handler: ^11.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  isar_generator: ^3.1.0+1
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - assets/
    - .env
